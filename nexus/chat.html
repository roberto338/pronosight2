<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nexus</title>
  <style>
    /* ── Reset & variables ─────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #0f0f0f;
      --surface:     #1a1a1a;
      --surface2:    #242424;
      --accent:      #7c3aed;
      --accent-h:    #6d28d9;
      --text:        #f5f5f5;
      --text2:       #888;
      --border:      #2a2a2a;
      --user-bg:     #3b1f6e;
      --nexus-bg:    #1a1a1a;
      --error:       #ef4444;
      --success:     #10b981;
      --topbar-h:    56px;
      --radius:      12px;
      --font:        system-ui, -apple-system, 'Segoe UI', sans-serif;
    }

    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font); font-size: 15px; }

    /* ── Layout ─────────────────────────────────── */
    #app { display: flex; flex-direction: column; height: 100vh; max-width: 860px; margin: 0 auto; }

    /* ── Top bar ─────────────────────────────────── */
    #topbar {
      flex-shrink: 0;
      height: var(--topbar-h);
      display: flex;
      align-items: center;
      padding: 0 16px;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    #topbar .logo {
      font-size: 17px; font-weight: 700; letter-spacing: -.3px;
      color: var(--text); display: flex; align-items: center; gap: 8px;
    }
    #topbar .logo .n-icon {
      width: 28px; height: 28px; background: var(--accent);
      border-radius: 8px; display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 800; color: #fff; flex-shrink: 0;
    }
    #topbar .status { font-size: 12px; color: var(--success); display: flex; align-items: center; gap: 5px; }
    #topbar .status::before { content: ''; width: 7px; height: 7px; background: var(--success); border-radius: 50%; display: block; }
    #topbar .spacer { flex: 1; }
    #clearBtn {
      background: transparent; border: 1px solid var(--border);
      color: var(--text2); padding: 5px 12px; border-radius: 6px;
      cursor: pointer; font-size: 12px; font-family: var(--font);
      transition: border-color .15s, color .15s;
    }
    #clearBtn:hover { border-color: var(--error); color: var(--error); }

    /* ── Messages area ────────────────────────────── */
    #messages {
      flex: 1; overflow-y: auto;
      padding: 24px 16px 12px;
      display: flex; flex-direction: column; gap: 4px;
      scroll-behavior: smooth;
    }
    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* ── Message rows ─────────────────────────────── */
    .msg-row { display: flex; gap: 10px; max-width: 100%; animation: fadeUp .2s ease; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .msg-row.user   { flex-direction: row-reverse; margin-left: 80px; }
    .msg-row.nexus  { margin-right: 80px; }
    .msg-row.system { justify-content: center; margin: 8px 0; }

    .avatar {
      width: 30px; height: 30px; background: var(--accent);
      border-radius: 8px; display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 800; color: #fff;
      flex-shrink: 0; align-self: flex-end;
    }

    .bubble {
      padding: 10px 14px; border-radius: var(--radius);
      line-height: 1.55; font-size: 14.5px; word-break: break-word; max-width: 100%;
    }
    .msg-row.user  .bubble { background: var(--user-bg); color: var(--text); border-bottom-right-radius: 3px; }
    .msg-row.nexus .bubble { background: var(--nexus-bg); border: 1px solid var(--border); color: var(--text); border-bottom-left-radius: 3px; }
    .msg-row.system .bubble { background: transparent; color: var(--text2); font-size: 12px; text-align: center; border: none; padding: 4px 8px; }

    .ts { font-size: 11px; color: var(--text2); margin-top: 4px; display: block; opacity: .7; }
    .msg-row.user  .ts { text-align: right; }
    .msg-row.nexus .ts { text-align: left; padding-left: 40px; }

    .bubble-wrap { display: flex; flex-direction: column; max-width: 100%; min-width: 0; }

    /* ── Markdown in bubbles ─────────────────────── */
    .bubble strong { font-weight: 700; }
    .bubble em     { font-style: italic; color: #c4b5fd; }
    .bubble code {
      background: #0d0d0d; border: 1px solid var(--border);
      padding: 1px 5px; border-radius: 4px;
      font-family: 'Menlo','Monaco','Consolas',monospace;
      font-size: 12.5px; color: #a78bfa;
    }
    .bubble pre {
      background: #0d0d0d; border: 1px solid var(--border);
      border-radius: 8px; padding: 12px 14px; overflow-x: auto; margin: 6px 0;
    }
    .bubble pre code { background: transparent; border: none; padding: 0; color: #e2e8f0; font-size: 12.5px; line-height: 1.6; }
    .bubble ul, .bubble ol { padding-left: 18px; margin: 4px 0; }
    .bubble li { margin: 2px 0; line-height: 1.5; }
    .bubble hr { border: none; border-top: 1px solid var(--border); margin: 8px 0; }
    .bubble p  { margin: 4px 0; }
    .bubble h3 { font-size: 14px; font-weight: 700; margin: 8px 0 4px; color: #c4b5fd; }
    .bubble h2 { font-size: 15px; font-weight: 700; margin: 10px 0 4px; color: #c4b5fd; }

    .agent-tag {
      display: inline-block; font-size: 10px;
      background: var(--surface2); color: var(--text2);
      padding: 1px 6px; border-radius: 4px; margin-bottom: 5px;
      text-transform: uppercase; letter-spacing: .5px;
    }

    /* ── Typing indicator ─────────────────────────── */
    .typing-dots { display: flex; align-items: center; gap: 4px; padding: 4px 2px; height: 20px; }
    .typing-dots span { width: 6px; height: 6px; background: var(--text2); border-radius: 50%; animation: bounce .9s infinite; }
    .typing-dots span:nth-child(2) { animation-delay: .15s; }
    .typing-dots span:nth-child(3) { animation-delay: .3s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: .4; }
      40%           { transform: translateY(-5px); opacity: 1; }
    }

    /* ── Quick actions ────────────────────────────── */
    #quick { flex-shrink: 0; padding: 8px 16px 0; display: flex; gap: 8px; flex-wrap: wrap; }
    .pill {
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--text); padding: 5px 12px; border-radius: 20px;
      cursor: pointer; font-size: 12.5px; font-family: var(--font);
      transition: background .15s, border-color .15s; white-space: nowrap;
    }
    .pill:hover { background: var(--surface); border-color: var(--accent); }

    /* ── File preview bar ─────────────────────────── */
    #file-preview {
      display: none;
      flex-shrink: 0;
      margin: 6px 16px 0;
      padding: 8px 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      align-items: center;
      gap: 10px;
      animation: fadeUp .2s ease;
    }
    #file-preview.visible { display: flex; }
    #fp-thumb { height: 76px; max-width: 108px; object-fit: cover; border-radius: 6px; flex-shrink: 0; }
    #fp-icon  { font-size: 26px; flex-shrink: 0; }
    #fp-info  { flex: 1; min-width: 0; }
    #fp-name  { font-size: 13px; color: var(--text); font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    #fp-size  { font-size: 11px; color: var(--text2); margin-top: 2px; }
    #fp-remove {
      background: transparent; border: 1px solid var(--border);
      color: var(--text2); cursor: pointer;
      width: 26px; height: 26px; border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px; line-height: 1; flex-shrink: 0;
      transition: border-color .15s, color .15s;
    }
    #fp-remove:hover { border-color: var(--error); color: var(--error); }

    /* ── Input bar ────────────────────────────────── */
    #inputbar {
      flex-shrink: 0; padding: 10px 16px 14px;
      background: var(--bg); display: flex; gap: 10px; align-items: flex-end;
    }
    #attachBtn {
      width: 40px; height: 40px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; color: var(--text2); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: border-color .15s, color .15s;
    }
    #attachBtn:hover   { border-color: var(--accent); color: var(--accent); }
    #attachBtn.active  { border-color: var(--accent); color: var(--accent); background: rgba(124,58,237,.15); }
    #input {
      flex: 1; background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); color: var(--text); font-family: var(--font);
      font-size: 14.5px; padding: 10px 14px; resize: none; outline: none;
      max-height: 160px; line-height: 1.5; transition: border-color .15s; overflow-y: auto;
    }
    #input::placeholder { color: var(--text2); }
    #input:focus { border-color: var(--accent); }
    #sendBtn {
      width: 40px; height: 40px; background: var(--accent); border: none;
      border-radius: 10px; color: #fff; cursor: pointer; font-size: 18px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: background .15s, transform .1s;
    }
    #sendBtn:hover   { background: var(--accent-h); }
    #sendBtn:active  { transform: scale(.93); }
    #sendBtn:disabled { opacity: .4; cursor: not-allowed; transform: none; }

    /* ── Drop zone overlay ────────────────────────── */
    #drop-overlay {
      display: none; position: fixed; inset: 0; z-index: 200;
      background: rgba(124,58,237,.1); backdrop-filter: blur(3px);
      align-items: center; justify-content: center;
      pointer-events: none;
    }
    #drop-overlay.active { display: flex; pointer-events: all; }
    #drop-inner {
      background: var(--surface); border: 2px dashed var(--accent);
      border-radius: 20px; padding: 52px 80px; text-align: center;
      user-select: none; pointer-events: none;
    }
    #drop-inner .di-icon { font-size: 48px; margin-bottom: 14px; display: block; }
    #drop-inner .di-text { font-size: 18px; font-weight: 700; color: var(--accent); }
    #drop-inner .di-sub  { font-size: 12.5px; color: var(--text2); margin-top: 8px; }

    /* ── File attachment in user bubble ───────────── */
    .bubble-img {
      display: block; max-width: 280px; max-height: 200px;
      object-fit: contain; border-radius: 8px; margin-top: 8px;
      border: 1px solid rgba(255,255,255,.08); cursor: pointer;
    }
    .bubble-img:hover { opacity: .9; }
    .file-pill {
      display: inline-flex; align-items: center; gap: 7px;
      background: rgba(255,255,255,.07); border: 1px solid rgba(255,255,255,.1);
      border-radius: 8px; padding: 6px 10px; margin-top: 8px; font-size: 12.5px;
      max-width: 240px;
    }
    .file-pill .fp-n { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; min-width: 0; }
    .file-pill .fp-s { color: var(--text2); flex-shrink: 0; font-size: 11px; }

    /* ── Error bubble ─────────────────────────────── */
    .bubble.error { background: rgba(239,68,68,.12); border: 1px solid rgba(239,68,68,.3); color: #fca5a5; }

    /* ── Lightbox ─────────────────────────────────── */
    #lightbox {
      display: none; position: fixed; inset: 0; z-index: 300;
      background: rgba(0,0,0,.88); align-items: center; justify-content: center; cursor: zoom-out;
    }
    #lightbox.open { display: flex; }
    #lightbox img { max-width: 92vw; max-height: 92vh; object-fit: contain; border-radius: 8px; }

    /* ── Mobile ───────────────────────────────────── */
    @media (max-width: 600px) {
      .msg-row.user  { margin-left: 40px; }
      .msg-row.nexus { margin-right: 40px; }
      .bubble        { font-size: 14px; }
      #drop-inner    { padding: 36px 40px; }
    }
  </style>
</head>
<body>

<!-- Hidden file input -->
<input type="file" id="fileInput"
  accept="image/jpeg,image/png,image/gif,image/webp,application/pdf,.pdf,.txt,.md,.json,.csv"
  style="display:none">

<!-- Drop zone overlay -->
<div id="drop-overlay">
  <div id="drop-inner">
    <span class="di-icon">📎</span>
    <div class="di-text">Déposer le fichier ici</div>
    <div class="di-sub">Images · PDF · TXT · JSON · CSV — max 10 MB</div>
  </div>
</div>

<!-- Lightbox for full-size images -->
<div id="lightbox">
  <img id="lightbox-img" src="" alt="Image">
</div>

<div id="app">

  <!-- Top bar -->
  <div id="topbar">
    <div class="logo">
      <div class="n-icon">N</div>
      Nexus
    </div>
    <div class="status">En ligne</div>
    <div class="spacer"></div>
    <button id="clearBtn" title="Effacer la conversation (Ctrl+L)">Effacer</button>
  </div>

  <!-- Messages -->
  <div id="messages"></div>

  <!-- Quick actions -->
  <div id="quick">
    <button class="pill" data-fill="Quels sont mes projets actifs ?">📊 Mes projets</button>
    <button class="pill" data-fill="Recherche ">🔍 Recherche…</button>
    <button class="pill" data-fill="Lance un business autour de ">💼 Business…</button>
    <button class="pill" data-fill="Rédige un ">📝 Rédige…</button>
  </div>

  <!-- File preview (above input bar) -->
  <div id="file-preview"></div>

  <!-- Input bar -->
  <div id="inputbar">
    <button id="attachBtn" title="Joindre un fichier (Ctrl+U)">
      <!-- Paperclip icon -->
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
      </svg>
    </button>
    <textarea id="input" rows="1" placeholder="Message Nexus… (Entrée pour envoyer)"></textarea>
    <button id="sendBtn" title="Envoyer">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"></line>
        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
      </svg>
    </button>
  </div>

</div>

<script>
// ══════════════════════════════════════════════
// Nexus Chat — vanilla JS
// ══════════════════════════════════════════════

const STORAGE_KEY = 'nexus-chat-v1';
const MAX_STORED  = 50;
const POLL_MS     = 2000;
const TIMEOUT_MS  = 120_000;
const MAX_FILE_B  = 10 * 1024 * 1024; // 10 MB

const $messages    = document.getElementById('messages');
const $input       = document.getElementById('input');
const $sendBtn     = document.getElementById('sendBtn');
const $clearBtn    = document.getElementById('clearBtn');
const $fileInput   = document.getElementById('fileInput');
const $attachBtn   = document.getElementById('attachBtn');
const $filePreview = document.getElementById('file-preview');
const $dropOverlay = document.getElementById('drop-overlay');
const $lightbox    = document.getElementById('lightbox');
const $lightboxImg = document.getElementById('lightbox-img');

let isProcessing = false;
let attachedFile  = null; // { name, type, size, data: base64, isImage }
let dragDepth     = 0;

// ── Utilities ───────────────────────────────────
function fmtBytes(n) {
  if (n < 1024)        return n + ' B';
  if (n < 1048576)     return (n / 1024).toFixed(1) + ' KB';
  return (n / 1048576).toFixed(1) + ' MB';
}

function fileIcon(type = '') {
  if (type.startsWith('image/'))        return '🖼️';
  if (type === 'application/pdf')       return '📄';
  if (type === 'application/json')      return '📋';
  if (type.includes('csv'))             return '📊';
  if (type.includes('markdown') || type === 'text/plain') return '📝';
  return '📄';
}

function escHtml(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function fmtTime(iso) {
  const d = iso ? new Date(iso) : new Date();
  return d.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

// ── File handling ───────────────────────────────
function readBase64(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload  = () => res(r.result.split(',')[1]); // strip data:type;base64, prefix
    r.onerror = rej;
    r.readAsDataURL(file);
  });
}

async function handleFile(file) {
  if (!file) return;
  if (file.size > MAX_FILE_B) {
    sysMsg(`❌ Fichier trop volumineux (${fmtBytes(file.size)} — max 10 MB)`);
    return;
  }
  try {
    const data    = await readBase64(file);
    const isImage = file.type.startsWith('image/');
    attachedFile  = { name: file.name, type: file.type || 'application/octet-stream', size: file.size, data, isImage };
    renderFilePreview();
    $attachBtn.classList.add('active');
    $input.focus();
  } catch (err) {
    sysMsg('❌ Impossible de lire le fichier : ' + err.message);
  }
}

function renderFilePreview() {
  if (!attachedFile) return;
  $filePreview.innerHTML = '';

  if (attachedFile.isImage) {
    const img = document.createElement('img');
    img.id  = 'fp-thumb';
    img.src = `data:${attachedFile.type};base64,${attachedFile.data}`;
    img.alt = attachedFile.name;
    $filePreview.appendChild(img);
  } else {
    const icon = document.createElement('span');
    icon.id          = 'fp-icon';
    icon.textContent = fileIcon(attachedFile.type);
    $filePreview.appendChild(icon);
  }

  const info = document.createElement('div');
  info.id        = 'fp-info';
  info.innerHTML = `<div id="fp-name">${escHtml(attachedFile.name)}</div>`
                 + `<div id="fp-size">${fmtBytes(attachedFile.size)}</div>`;
  $filePreview.appendChild(info);

  const btn       = document.createElement('button');
  btn.id          = 'fp-remove';
  btn.title       = 'Retirer';
  btn.textContent = '×';
  btn.onclick     = clearFile;
  $filePreview.appendChild(btn);

  $filePreview.classList.add('visible');
}

function clearFile() {
  attachedFile = null;
  $filePreview.innerHTML = '';
  $filePreview.classList.remove('visible');
  $attachBtn.classList.remove('active');
  $fileInput.value = '';
}

// ── LocalStorage ────────────────────────────────
function loadStored() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); }
  catch { return []; }
}
function saveStored(msgs) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(msgs.slice(-MAX_STORED))); }
  catch {}
}
function clearStored() { localStorage.removeItem(STORAGE_KEY); }

// ── Markdown renderer ───────────────────────────
function renderMarkdown(text) {
  if (!text) return '';

  const esc = s => s
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');

  // Protect code blocks
  const codeBlocks = [];
  text = text.replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) => {
    const idx = codeBlocks.length;
    codeBlocks.push(`<pre><code>${esc(code.trim())}</code></pre>`);
    return `\x00CB${idx}\x00`;
  });

  // Inline code
  const inlines = [];
  text = text.replace(/`([^`\n]+)`/g, (_, c) => {
    const idx = inlines.length;
    inlines.push(`<code>${esc(c)}</code>`);
    return `\x00IC${idx}\x00`;
  });

  text = esc(text);
  text = text.replace(/^###\s+(.+)$/gm, '<h3>$1</h3>');
  text = text.replace(/^##\s+(.+)$/gm,  '<h2>$1</h2>');
  text = text.replace(/^[─\-]{3,}$/gm, '<hr>');
  text = text.replace(/\*\*([^*\n]+)\*\*/g, '<strong>$1</strong>');
  text = text.replace(/\*([^*\n]+)\*/g,     '<strong>$1</strong>');
  text = text.replace(/_([^_\n]+)_/g, '<em>$1</em>');

  const lines = text.split('\n');
  const out = [];
  let inList = false;
  for (const line of lines) {
    const lm = line.match(/^[-•]\s+(.+)/);
    if (lm) {
      if (!inList) { out.push('<ul>'); inList = true; }
      out.push(`<li>${lm[1]}</li>`);
    } else {
      if (inList) { out.push('</ul>'); inList = false; }
      out.push(line);
    }
  }
  if (inList) out.push('</ul>');
  text = out.join('\n');

  text = text.split(/\n{2,}/).map(block => {
    block = block.trim();
    if (!block) return '';
    if (block.startsWith('<h') || block.startsWith('<ul') ||
        block.startsWith('<hr') || block.startsWith('<pre')) return block;
    return `<p>${block.replace(/\n/g, '<br>')}</p>`;
  }).join('');

  text = text.replace(/\x00CB(\d+)\x00/g, (_, i) => codeBlocks[i]);
  text = text.replace(/\x00IC(\d+)\x00/g, (_, i) => inlines[i]);
  return text;
}

// ── Render a single message ──────────────────────
// msg: { role, content, ts, agentType?, error?,
//        fileInfo?: { name, type, size },   ← from localStorage (no base64)
//        _fileData?: base64string,           ← in-memory only, current session
//        _fileIsImg?: bool }
function renderMsg(msg) {
  const row = document.createElement('div');
  row.className = `msg-row ${msg.role}`;

  if (msg.role === 'system') {
    const wrap   = document.createElement('div');
    wrap.className = 'bubble-wrap';
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = msg.content;
    wrap.appendChild(bubble);
    row.appendChild(wrap);
    $messages.appendChild(row);
    return row;
  }

  if (msg.role === 'nexus') {
    const av = document.createElement('div');
    av.className  = 'avatar';
    av.textContent = 'N';
    row.appendChild(av);
  }

  const wrap = document.createElement('div');
  wrap.className = 'bubble-wrap';

  if (msg.role === 'nexus' && msg.agentType && msg.agentType !== 'web') {
    const tag = document.createElement('span');
    tag.className  = 'agent-tag';
    tag.textContent = msg.agentType;
    wrap.appendChild(tag);
  }

  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  if (msg.error) bubble.classList.add('error');

  if (msg.role === 'nexus') {
    bubble.innerHTML = renderMarkdown(msg.content);
  } else {
    // User bubble: text
    if (msg.content) {
      const p = document.createElement('p');
      p.style.margin  = '0';
      p.textContent   = msg.content;
      bubble.appendChild(p);
    }

    // File attachment — full data (current session, in-memory)
    if (msg._fileData && msg.fileInfo) {
      const fi = msg.fileInfo;
      if (msg._fileIsImg) {
        const img = document.createElement('img');
        img.className = 'bubble-img';
        img.src       = `data:${fi.type};base64,${msg._fileData}`;
        img.alt       = fi.name;
        img.title     = 'Cliquer pour agrandir';
        img.onclick   = () => openLightbox(`data:${fi.type};base64,${msg._fileData}`);
        bubble.appendChild(img);
      } else {
        bubble.appendChild(makeFilePill(fi.name, fi.type, fi.size));
      }
    } else if (msg.fileInfo) {
      // Metadata only (loaded from localStorage — no base64)
      bubble.appendChild(makeFilePill(msg.fileInfo.name, msg.fileInfo.type, msg.fileInfo.size));
    }
  }

  const ts = document.createElement('span');
  ts.className  = 'ts';
  ts.textContent = fmtTime(msg.ts);

  wrap.appendChild(bubble);
  wrap.appendChild(ts);
  row.appendChild(wrap);
  $messages.appendChild(row);
  return row;
}

function makeFilePill(name, type, size) {
  const pill = document.createElement('div');
  pill.className = 'file-pill';
  pill.innerHTML =
    `<span>${fileIcon(type)}</span>` +
    `<span class="fp-n">${escHtml(name)}</span>` +
    `<span class="fp-s">${fmtBytes(size || 0)}</span>`;
  return pill;
}

// ── Lightbox ─────────────────────────────────────
function openLightbox(src) {
  $lightboxImg.src = src;
  $lightbox.classList.add('open');
}
$lightbox.addEventListener('click', () => $lightbox.classList.remove('open'));
document.addEventListener('keydown', e => { if (e.key === 'Escape') $lightbox.classList.remove('open'); });

// ── System / status messages ──────────────────────
function sysMsg(text) {
  renderMsg({ role: 'system', content: text, ts: new Date().toISOString() });
  scrollBottom();
}

// ── Typing indicator ──────────────────────────────
function addTyping(label) {
  const row = document.createElement('div');
  row.className = 'msg-row nexus';
  row.id = 'typing-' + Date.now();

  const av = document.createElement('div');
  av.className  = 'avatar';
  av.textContent = 'N';

  const wrap   = document.createElement('div');
  wrap.className = 'bubble-wrap';
  const bubble = document.createElement('div');
  bubble.className = 'bubble';

  if (label) {
    bubble.textContent = label;
  } else {
    const dots = document.createElement('div');
    dots.className = 'typing-dots';
    dots.innerHTML = '<span></span><span></span><span></span>';
    bubble.appendChild(dots);
  }

  wrap.appendChild(bubble);
  row.appendChild(av);
  row.appendChild(wrap);
  $messages.appendChild(row);
  scrollBottom();
  return row;
}

function updateTyping(row, text) {
  const b = row.querySelector('.bubble');
  if (b) b.textContent = text;
}

function replaceTyping(row, msg) {
  const nr = renderMsg(msg);
  $messages.replaceChild(nr, row);
  scrollBottom();
}

function scrollBottom() { $messages.scrollTop = $messages.scrollHeight; }

// ── Poll task ─────────────────────────────────────
async function pollTask(taskId) {
  const deadline = Date.now() + TIMEOUT_MS;
  while (Date.now() < deadline) {
    await sleep(POLL_MS);
    const r = await fetch(`/nexus/chat/poll/${taskId}`);
    if (!r.ok) throw new Error(`Poll HTTP ${r.status}`);
    const d = await r.json();
    if (d.status === 'done')   return d;
    if (d.status === 'failed') throw new Error(d.error || 'Tâche échouée');
  }
  throw new Error('Timeout — Nexus prend trop de temps (>2 min)');
}

// ── Send ─────────────────────────────────────────
async function send() {
  const text = $input.value.trim();
  if ((!text && !attachedFile) || isProcessing) return;

  isProcessing       = true;
  $sendBtn.disabled  = true;
  $input.value       = '';
  autoResize();

  // Snapshot and clear attachment
  const fileSnap = attachedFile ? { ...attachedFile } : null;
  clearFile();

  // ── Build messages for display / storage ──────
  const displayText = text || (fileSnap ? fileSnap.name : '');
  const fileInfo    = fileSnap ? { name: fileSnap.name, type: fileSnap.type, size: fileSnap.size } : null;

  // Stored: no base64 (localStorage size)
  const storedMsg = {
    role:     'user',
    content:  displayText,
    ts:       new Date().toISOString(),
    ...(fileInfo && { fileInfo }),
  };
  const stored = loadStored();
  stored.push(storedMsg);
  saveStored(stored);

  // Rendered: with base64 for image display
  renderMsg({
    ...storedMsg,
    _fileData:  fileSnap?.data  || null,
    _fileIsImg: fileSnap?.isImage || false,
  });
  scrollBottom();

  const typingRow = addTyping();

  try {
    const body = { message: text };
    if (fileSnap) {
      body.file = {
        name: fileSnap.name,
        type: fileSnap.type,
        size: fileSnap.size,
        data: fileSnap.data,
      };
    }

    const resp = await fetch('/nexus/chat/send', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify(body),
    });
    if (!resp.ok) {
      const err = await resp.json().catch(() => ({ error: `HTTP ${resp.status}` }));
      throw new Error(err.error || `HTTP ${resp.status}`);
    }
    const { taskId, explanation, agentType } = await resp.json();

    updateTyping(typingRow, `⏳ ${explanation || 'Traitement en cours…'}`);

    const result  = await pollTask(taskId);
    const nexusMsg = {
      role:      'nexus',
      content:   result.output,
      agentType: result.agentType || agentType,
      ts:        new Date().toISOString(),
    };

    const s2 = loadStored();
    s2.push(nexusMsg);
    saveStored(s2);
    replaceTyping(typingRow, nexusMsg);

  } catch (err) {
    replaceTyping(typingRow, {
      role: 'nexus', content: `❌ ${err.message}`, error: true, ts: new Date().toISOString(),
    });
    scrollBottom();
  } finally {
    isProcessing      = false;
    $sendBtn.disabled = false;
    $input.focus();
  }
}

// ── Auto-resize textarea ──────────────────────────
function autoResize() {
  $input.style.height = 'auto';
  $input.style.height = Math.min($input.scrollHeight, 160) + 'px';
}

// ── Init ──────────────────────────────────────────
function init() {
  const stored = loadStored();
  if (stored.length === 0) {
    renderMsg({
      role:    'nexus',
      content: 'Bonjour Roberto. Je suis Nexus, ton assistant IA personnel.\n\nTous tes projets sont actifs — *PronoSight*, *MÉTAFICTION*, *NutriPlan*, *Fruity Arena*.\n\nTu peux aussi joindre une image ou un fichier via le bouton 📎.\n\nQue veux-tu accomplir aujourd\'hui ?',
      ts:      new Date().toISOString(),
    });
  } else {
    for (const msg of stored) renderMsg(msg);
  }
  scrollBottom();
}

// ── Events ───────────────────────────────────────
$input.addEventListener('input', autoResize);

$input.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});

$sendBtn.addEventListener('click', send);

// Attach button → open file picker
$attachBtn.addEventListener('click', () => $fileInput.click());

// File picker selection
$fileInput.addEventListener('change', e => {
  const f = e.target.files[0];
  if (f) handleFile(f);
});

// ── Drag & drop ───────────────────────────────────
document.addEventListener('dragenter', e => {
  if (!e.dataTransfer?.types?.includes('Files')) return;
  e.preventDefault();
  dragDepth++;
  $dropOverlay.classList.add('active');
});
document.addEventListener('dragover', e => {
  if (!e.dataTransfer?.types?.includes('Files')) return;
  e.preventDefault();
});
document.addEventListener('dragleave', () => {
  dragDepth--;
  if (dragDepth <= 0) {
    dragDepth = 0;
    $dropOverlay.classList.remove('active');
  }
});
document.addEventListener('drop', e => {
  e.preventDefault();
  dragDepth = 0;
  $dropOverlay.classList.remove('active');
  const f = e.dataTransfer?.files[0];
  if (f) handleFile(f);
});

// ── Paste image from clipboard ─────────────────────
document.addEventListener('paste', e => {
  if ($lightbox.classList.contains('open')) return;
  const items = e.clipboardData?.items;
  if (!items) return;
  for (const item of items) {
    if (item.type.startsWith('image/')) {
      e.preventDefault();
      const file = item.getAsFile();
      if (file) handleFile(file);
      break;
    }
  }
});

// ── Keyboard shortcuts ────────────────────────────
document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'k') { e.preventDefault(); $input.focus(); }
  if ((e.ctrlKey || e.metaKey) && e.key === 'l') { e.preventDefault(); $clearBtn.click(); }
  if ((e.ctrlKey || e.metaKey) && e.key === 'u') { e.preventDefault(); $attachBtn.click(); }
  if (e.key === 'Escape' && !$lightbox.classList.contains('open')) $input.blur();
});

$clearBtn.addEventListener('click', () => {
  if (!confirm('Effacer tout l\'historique ?')) return;
  clearStored();
  clearFile();
  $messages.innerHTML = '';
  renderMsg({
    role:    'nexus',
    content: 'Conversation effacée. Comment puis-je t\'aider ?',
    ts:      new Date().toISOString(),
  });
  scrollBottom();
  $input.focus();
});

document.querySelectorAll('.pill').forEach(btn => {
  btn.addEventListener('click', () => {
    const fill = btn.dataset.fill;
    $input.value = fill;
    $input.focus();
    $input.setSelectionRange(fill.length, fill.length);
    autoResize();
  });
});

init();
</script>
</body>
</html>
